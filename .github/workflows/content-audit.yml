name: Auditoria de contenidos

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "index.html"
      - "script.js"
      - "styles.css"
      - "scripts/audit_data.py"
      - "scripts/curate_sources.mjs"
      - ".github/workflows/content-audit.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Comprobar datos y vigencia
        run: python3 scripts/audit_data.py --check-http --http-timeout 20 --max-review-age 14 --fail-on-warning --strict-global-drive-ids
